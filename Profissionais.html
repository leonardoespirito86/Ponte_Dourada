<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="estilos/style.css">
    <script src="scripts/script.js"></script>
    <title>Profissionais - GEC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="principal">
        <h1 style="color: #FA2408;">Cadastro de Profissionais</h1>
        <form id="formProfissional">
            <div class="campo">
                <label>Nome do Profissional:</label>
                <input type="text" id="nomeProf" required>
            </div>
            <div class="campo">
                <label>Especialidade:</label>
                <input type="text" id="especialidade">
            </div>
            <input type="button" value="SALVAR" onclick="alert('Profissional cadastrado!')" class="btn-logar">
            <input type="button" value="VOLTAR" onclick="window.location.href='PaginaPrincipal.html'" style="background-color: #687588; margin-top: 10px;" class="btn-logar">
        </form>
    </div>
</body>
</html>
