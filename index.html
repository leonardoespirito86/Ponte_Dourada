<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="estilos/style.css">
    <script src="scripts/script.js"></script>
    <title>Login - GEC Ponte Dourada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="principal">
        <div class="logo-area" style="text-align: center; margin-bottom: 30px;">
    <img src="img/Logotipos/1.png" alt="Logo Ponte Dourada" style="max-width: 300px; height: auto;">
</div>

        <form>
            <div class="campo">
                <label>E-mail:</label>
                <input type="email" id="email" placeholder="Digite seu e-mail" required>
            </div>
            
            <div class="campo">
                <label>Senha:</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <input type="button" value="LOGAR" onclick="logar()" class="btn-logar">
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
