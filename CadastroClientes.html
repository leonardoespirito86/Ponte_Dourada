<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="estilos/style.css">
    <script src="scripts/script.js"></script>
    <title>Cadastro de Clientes - GEC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="principal">
        <h1 style="color: #FA2408;">Cadastro de Clientes</h1>
        <p>Preencha os dados abaixo para registrar um novo cliente.</p>

        <form id="formCliente">
            <div class="campo">
                <label>Nome Completo:</label>
                <input type="text" id="nome" placeholder="Nome do cliente" required>
            </div>

            <div class="campo">
                <label>E-mail de Contato:</label>
                <input type="email" id="emailCliente" placeholder="exemplo@email.com" required>
            </div>

            <div class="campo">
                <label>Data de Nascimento:</label>
                <input type="date" id="dataNascimento" required>
            </div>

            <div class="campo">
                <label>Telefone/WhatsApp:</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000">
            </div>

            <input type="button" value="SALVAR CLIENTE" onclick="salvar()" class="btn-logar">
            
            <input type="button" value="VOLTAR AO MENU" onclick="voltar()" style="background-color: #687588; margin-top: 10px;" class="btn-logar">
        </form>
    </div>

    <script>
        function salvar() {
            // Aqui pegamos o nome apenas para mostrar na mensagem
            let nome = document.getElementById('nome').value;
            if(nome === "") {
                alert("Por favor, preencha o nome.");
            } else {
                alert("Cliente " + nome + " cadastrado com sucesso!");
                // Limpa o formulário após salvar
                document.getElementById('formCliente').reset();
            }
        }

        // Esta função faz o navegador voltar para a tela anterior
        function voltar() {
            window.location.href = "PaginaPrincipal.html";
        }
    </script>
</body>
</html>
