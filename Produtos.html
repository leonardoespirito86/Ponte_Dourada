<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="estilos/style.css">
    <script src="scripts/script.js"></script>
    <title>Cadastro de Produtos - GEC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="principal">
        <h1 style="color: #FA2408;">Cadastro de Produtos</h1>
        
        <form id="formProduto">
            <div class="campo">
                <label>Nome do Produto:</label>
                <input type="text" id="nomeProduto" placeholder="Ex: Cama Hospitalar, Cadeira de Rodas..." required>
            </div>

            <div class="campo">
                <label>Quantidade em Estoque:</label>
                <input type="number" id="qtdProduto" placeholder="0">
            </div>

            <div class="campo">
                <label>Categoria:</label>
                <input type="text" id="categoria" placeholder="Ex: Equipamentos, Medicamentos">
            </div>

            <input type="button" value="CADASTRAR PRODUTO" onclick="salvarProduto()" class="btn-logar">
            <input type="button" value="VOLTAR AO MENU" onclick="voltar()" style="background-color: #687588; margin-top: 10px;" class="btn-logar">
        </form>
    </div>

    <script>
        function salvarProduto() {
            alert("Produto cadastrado com sucesso!");
            document.getElementById('formProduto').reset();
        }

        function voltar() {
            window.location.href = "PaginaPrincipal.html";
        }
    </script>
</body>
</html>
